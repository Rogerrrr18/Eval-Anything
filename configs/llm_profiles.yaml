# LLM 端点配置
# 每个profile定义一个LLM后端，通过 class 字段选择实现类
# 支持所有 OpenAI API 兼容的推理服务（vLLM / SGLang / LMStudio / Ollama / OpenAI / DeepSeek / Qwen 等）
#
# 【API key 安全】
#   不要把真实 api_key 明文写进本文件并提交！三种安全方式：
#     1. api_key_env: SOMETHING_KEY   → 从环境变量 SOMETHING_KEY 读
#     2. api_key: "${SOMETHING_KEY}"  → 同上的紧凑写法
#     3. 复制本文件为 llm_profiles.local.yaml 后填明文（.local.yaml 加入 .gitignore）

llm_profiles:

  # ── Target-backed 环境占位 LLM ──
  # RAGQAEnvironment + DirectHarness 会直接调用 Target，不需要真实 LLM。
  mock_passthrough:
    class: "MockLLM"
    model_name: "mock-passthrough"
    endpoint_url: ""
    api_key: "EMPTY"
    temperature: 0.0
    max_tokens: 1
    timeout_seconds: 1

  # ════════════════════════════════════════════════
  #   本地推理服务（vLLM / SGLang / Ollama / LMStudio）
  # ════════════════════════════════════════════════

  # ── DeepSeek V4 Flash（本地 vLLM 示例） ──
  deepseek_v4_flash:
    class: "OpenAICompatibleLLM"
    model_name: "DeepSeek-V4-Flash"
    endpoint_url: "http://localhost:10814/v1/chat/completions"
    api_key: "EMPTY"
    temperature: 0.0
    max_tokens: 600
    top_p: 1.0
    timeout_seconds: 30
    enable_thinking: false
    extra_params: {}

  deepseek_v4_flash_b:
    class: "OpenAICompatibleLLM"
    model_name: "DeepSeek-V4-Flash"
    endpoint_url: "http://localhost:10815/v1/chat/completions"
    api_key: "EMPTY"
    temperature: 0.0
    max_tokens: 600
    top_p: 1.0
    timeout_seconds: 30

