# LLM-as-Judge 配置 — 跨家族 catalog
# ============================================================================
# 设计目标：
#   - 用户可以从这份 catalog 里挑 3 个跨家族的 judge 组成 panel（见 judge_panels.yaml）
#   - 同家族的 mini/haiku/plus 档可用环境变量临时切换，不必改 YAML
#   - 所有 judge 共享 default_labels + default_rubric anchor
#
# 环境变量约定（可选）：
#   - <FAMILY>_API_KEY            → api_key 来源
#   - <FAMILY>_JUDGE_MODEL        → 临时改用更便宜或更强的同家族模型
#   - <FAMILY>_JUDGE_ENDPOINT     → 自建代理 / Azure / 国内中转
# 没设的话用 YAML 里的 default。
#
# 安全：绝不要把真实 api_key 写进本文件。用 api_key_env 或 ${VAR}。
# ============================================================================

# ── 共享 rubric + label 集（用 YAML anchor 给所有 judge 复用） ──────────────
_anchors:
  labels: &default_labels
    - correct
    - format_error
    - missing_requirement
    - hallucination
    - incomplete_answer
    - weak_reasoning
    - poor_code_quality
    - weak_test_coverage
    - security_risk
    - documentation_gap

  rubric: &default_rubric |
    请根据任务、参考答案和模型输出进行评审。
    评分范围为 0 到 1：
    - 1.0: 完全满足要求，输出正确且证据充分
    - 0.8: 基本正确，仅有轻微遗漏或表达问题
    - 0.5: 部分正确，但存在重要缺失
    - 0.2: 大部分错误，仅有少量相关内容
    - 0.0: 完全错误、无法解析或与任务无关
    必须输出合法 JSON，字段包括 score、passed、labels、comment、evidence、dimensions。
    不要奖励冗长，不要奖励仅排版好看的输出。


judge_profiles:

  # 兜底默认裁判（不指定家族；走自己的环境变量）。
  # 单裁判模式用它；panel 模式忽略。
  default_judge:
    class: "OpenAICompatibleLLM"
    model_name: "${JUDGE_MODEL:-your-judge-model}"
    endpoint_url: "${JUDGE_ENDPOINT:-https://your-judge-endpoint/v1/chat/completions}"
    api_key_env: "JUDGE_API_KEY"
    temperature: 0.0
    max_tokens: 800
    threshold: 0.6
    allowed_labels: *default_labels
    rubric: *default_rubric

  # ── OpenAI 家族 ────────────────────────────────────────────────────────────
